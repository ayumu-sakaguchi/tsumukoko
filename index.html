<style>
  :root {
    --bg:#F7F5F2;--surface:#FFFFFF;--surface2:#F0EDE8;
    --text:#2D2A26;--text-sub:#7A746C;
    --accent:#7B9E87;--accent-light:#C8DDD0;--accent-dark:#4E7258;--border:#E0DAD2;
    --score-1:#E8A598;--score-2:#E8C49A;--score-3:#E8E0A0;--score-4:#A8D4B0;--score-5:#7BB8C0;
    --assist:#F0D8A8;--assist-border:#D4A840;--assist-text:#8C6A10;
    --radius:16px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,0.07);
  }
  .theme-sakura{--bg:#FFF5F7;--surface:#FFFFFF;--surface2:#FFE8EE;--accent:#D4789A;--accent-light:#FFD6E4;--accent-dark:#A0456A;--border:#FFD0DC;}
  .theme-sky{--bg:#F3F8FF;--surface:#FFFFFF;--surface2:#E4F0FF;--accent:#5B9BD5;--accent-light:#C4DEFF;--accent-dark:#2A6FAF;--border:#C8DFFF;}
  .theme-forest{--bg:#F2F7F2;--surface:#FFFFFF;--surface2:#E0EDDF;--accent:#4A8C5C;--accent-light:#B8DBBF;--accent-dark:#2A5C38;--border:#C0DCC4;}
  .theme-night{--bg:#1A1C22;--surface:#252830;--surface2:#2F3240;--text:#E8E4DC;--text-sub:#9A95A0;--accent:#8B9EC8;--accent-light:#3A4560;--accent-dark:#B8C8F0;--border:#3A3E50;--shadow:0 2px 12px rgba(0,0,0,0.3);--assist:#3A3010;--assist-border:#8C6A10;--assist-text:#E0B840;}
  *{box-sizing:border-box;margin:0;padding:0;}  html,body{overflow-x:hidden;max-width:100%;}
  body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}

  /* LOCK */
  #lock-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 24px 24px;overflow-y:auto;}
  #lock-screen.hidden{display:none;}
  .lock-icon{font-size:48px;margin-bottom:12px;}
  .lock-title{font-size:22px;font-weight:700;margin-bottom:6px;}
  .lock-sub{font-size:14px;color:var(--text-sub);margin-bottom:20px;text-align:center;}
  .pin-dots{display:flex;gap:16px;margin-bottom:16px;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--accent);background:transparent;transition:background 0.15s;}
  .pin-dot.filled{background:var(--accent);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
  .pin-key{aspect-ratio:1;border-radius:50%;border:none;background:var(--surface);color:var(--text);font-size:22px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;transition:background 0.15s,transform 0.1s;}
  .pin-key:active{background:var(--accent-light);transform:scale(0.94);}
  .pin-key.del{font-size:18px;background:transparent;box-shadow:none;color:var(--text-sub);}
  .pin-key.empty{background:transparent;box-shadow:none;cursor:default;}
  .lock-error{font-size:13px;color:#C04040;margin-bottom:12px;min-height:18px;text-align:center;}
  .lock-note{font-size:12px;color:#8B2035;margin-top:16px;text-align:center;line-height:1.6;}

  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
  .nav-btn{flex:1;padding:10px 4px 6px;background:none;border:none;color:var(--text-sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-family:inherit;transition:color 0.2s;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn svg{width:22px;height:22px;}

  /* PAGES */
  .page{display:none;padding:16px 16px 90px;max-width:480px;margin:0 auto;}
  .page.active{display:block;}

  /* HEADER */
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:8px;}
  .page-title{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
  .today-label{font-size:13px;color:var(--text-sub);}

  /* BACK BUTTON */
  .back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;padding:0;margin-bottom:16px;}
  .back-btn svg{width:18px;height:18px;}

  /* DATE PICKER ROW */
  .date-picker-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .date-picker-row input[type="date"]{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none;}
  .date-picker-row input[type="date"]:focus{border-color:var(--accent);}

  /* CARD */
  .card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
  .card-title{font-size:12px;font-weight:600;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;}

  /* SCORE */
  .score-row{display:flex;gap:6px;justify-content:center;}
  .score-btn{flex:1;aspect-ratio:1;border:2px solid var(--border);border-radius:12px;background:var(--surface2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:20px;transition:all 0.15s;padding:4px;}
  .score-btn span{font-size:9px;color:var(--text-sub);font-weight:600;line-height:1.3;text-align:center;white-space:pre-line;}
  .score-btn.selected{border-color:transparent;transform:scale(1.06);box-shadow:0 4px 14px rgba(0,0,0,0.12);}
  .score-btn[data-score="1"].selected{background:var(--score-1);}
  .score-btn[data-score="2"].selected{background:var(--score-2);}
  .score-btn[data-score="3"].selected{background:var(--score-3);}
  .score-btn[data-score="4"].selected{background:var(--score-4);}
  .score-btn[data-score="5"].selected{background:var(--score-5);}

  /* COLLAPSIBLE */
  .collapsible-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:2px 0;}
  .collapsible-header svg{width:18px;height:18px;color:var(--text-sub);transition:transform 0.2s;flex-shrink:0;}
  .collapsible-header.open svg{transform:rotate(180deg);}
  .collapsible-body{display:none;margin-top:14px;}
  .collapsible-body.open{display:block;}

  /* TEXTAREA */
  textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;padding:12px;resize:none;min-height:100px;outline:none;transition:border-color 0.2s;}
  textarea:focus{border-color:var(--accent);}

  /* HABITS */
  .habit-list{display:flex;flex-direction:column;gap:8px;}
  .habit-simple{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:var(--radius-sm);padding:11px 14px;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;user-select:none;}
  .habit-simple.checked{background:var(--accent-light);border-color:var(--accent);}
  .habit-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .habit-simple.checked .habit-check{background:var(--accent);border-color:var(--accent);}
  .habit-check svg{width:12px;height:12px;color:white;display:none;}
  .habit-simple.checked .habit-check svg{display:block;}
  .habit-name{font-size:14px;font-weight:500;flex:1;}
  .habit-dual{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;}
  .habit-dual-top{display:flex;align-items:center;}
  .habit-dual-name{font-size:14px;font-weight:500;flex:1;}
  .habit-dual-btns{display:flex;gap:6px;}
  .dual-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-sub);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
  .dual-btn.sel-self{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);}
  .dual-btn.sel-assist{background:var(--assist);border-color:var(--assist-border);color:var(--assist-text);}

  /* TAGS */
  .tag-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .tag-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-sub);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.15s;}
  .tag-btn.selected{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);font-weight:600;}

  /* SAVE */
  .save-btn{width:100%;padding:16px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:0.3px;transition:background 0.2s,transform 0.1s;margin-top:4px;}
  .save-btn:active{transform:scale(0.98);}
  .save-btn:hover{background:var(--accent-dark);}

  /* HISTORY */
  .history-entry{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform 0.1s;}
  .history-entry:active{transform:scale(0.99);}
  .history-entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .history-date{font-size:13px;color:var(--text-sub);font-weight:600;}
  .history-score{font-size:20px;}
  .history-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .history-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-light);color:var(--accent-dark);}
  .history-note{font-size:13px;color:var(--text-sub);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* GRAPH */
  .graph-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .period-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-sub);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.15s;}
  .period-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;}
  .date-range-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
  .date-range-row input[type="date"]{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;font-size:13px;outline:none;}
  .date-range-row span{color:var(--text-sub);font-size:13px;}
  canvas{width:100%!important;border-radius:var(--radius-sm);}
  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
  .stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;text-align:center;}
  .stat-val{font-size:22px;font-weight:700;color:var(--accent);}
  .stat-lbl{font-size:11px;color:var(--text-sub);margin-top:2px;}
  .print-btn{width:100%;padding:13px;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;}

  /* HABIT STATS */
  .habit-stat-list{display:flex;flex-direction:column;gap:8px;}
  .habit-stat-row{display:flex;align-items:center;gap:10px;}
  .habit-stat-label{font-size:13px;width:100px;flex-shrink:0;}
  .habit-stat-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden;}
  .habit-stat-bar{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s;}
  .habit-stat-bar.assist{background:var(--assist-border);}
  .habit-stat-pct{font-size:12px;font-weight:700;color:var(--accent);width:36px;text-align:right;flex-shrink:0;}

  /* SETTINGS */
  .setting-section{margin-bottom:24px;}
  .setting-label{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:10px;letter-spacing:0.5px;}
  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .theme-option{border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;transition:all 0.15s;background:var(--surface2);}
  .theme-option .swatch{width:28px;height:28px;border-radius:50%;margin:0 auto 6px;}
  .theme-option.active{border-color:var(--accent);background:var(--accent-light);}
  .setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
  .setting-row:last-child{border-bottom:none;}
  .setting-row-label{font-size:14px;font-weight:500;}
  .setting-row-sub{font-size:12px;color:var(--text-sub);margin-top:2px;}
  .text-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
  .text-btn.danger{border-color:#E8A598;color:#C04040;background:#FFF0F0;}

  /* MISC */
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-sub);}
  .empty-state .icon{font-size:48px;margin-bottom:12px;}
  .empty-state p{font-size:14px;}
  .badge{font-size:12px;background:var(--accent-light);color:var(--accent-dark);padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap;line-height:1.4;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:300;}
  .toast.show{opacity:1;}

<body>

<!-- LOCK SCREEN -->
<div id="lock-screen" class="hidden">
  <div class="lock-icon">&#x1F512;</div>
  <div class="lock-title" id="lock-title">ロック解除</div>
  <div class="lock-sub" id="lock-sub">4桁のPINを入力してください</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="lock-error" id="lock-error"></div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinInput(1)">1</button>
    <button class="pin-key" onclick="pinInput(2)">2</button>
    <button class="pin-key" onclick="pinInput(3)">3</button>
    <button class="pin-key" onclick="pinInput(4)">4</button>
    <button class="pin-key" onclick="pinInput(5)">5</button>
    <button class="pin-key" onclick="pinInput(6)">6</button>
    <button class="pin-key" onclick="pinInput(7)">7</button>
    <button class="pin-key" onclick="pinInput(8)">8</button>
    <button class="pin-key" onclick="pinInput(9)">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput(0)">0</button>
    <button class="pin-key del" onclick="pinDelete()">&#x232B;</button>
  </div>
  <button id="lock-cancel-btn" onclick="cancelPinSetup()" style="display:none;margin-top:24px;padding:10px 32px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-sub);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;">キャンセル</button>
  <div class="lock-note" id="lock-note"></div>
</div>

<!-- 通院日バナー -->
<div id="clinic-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:var(--accent);color:white;padding:12px 16px;text-align:center;font-size:14px;font-weight:600;line-height:1.5;">
  <span id="clinic-banner-text"></span>
  <button onclick="dismissClinicBanner()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:white;font-size:20px;cursor:pointer;line-height:1;">×</button>
</div>

<!-- RECORD PAGE -->
<div id="page-record" class="page active">
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;overflow:hidden;">
      <div id="app-icon" style="width:44px;height:44px;border-radius:10px;flex-shrink:0;background-size:cover;background-position:center;"></div>
      <div id="today-label" style="min-width:0;overflow:hidden;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <div id="already-saved-badge" style="display:none" class="badge">記録済み</div>
      <div style="position:relative;width:36px;height:36px;flex-shrink:0;">
        <div style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1.5px solid var(--border);pointer-events:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <input type="date" id="record-date" onchange="onRecordDateChange()" style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;">
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">今日の気分</div>
    <div class="score-row">
      <button class="score-btn" data-score="1" onclick="selectScore(1)">&#x1F61E;<span>つらい</span></button>
      <button class="score-btn" data-score="2" onclick="selectScore(2)">&#x1F615;<span>しんどい</span></button>
      <button class="score-btn" data-score="3" onclick="selectScore(3)">&#x1F610;<span>ふつう</span></button>
      <button class="score-btn" data-score="4" onclick="selectScore(4)">&#x1F642;<span>よい</span></button>
      <button class="score-btn" data-score="5" onclick="selectScore(5)">&#x1F60A;<span>とても&#10;よい</span></button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">生活習慣</div>
    <div class="habit-list" id="habit-list"></div>
  </div>
  <div class="card">
    <div class="collapsible-header" onclick="toggleCollapsible('tags-body',this)">
      <div class="card-title" style="margin:0">気持ちのタグ（任意）</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="collapsible-body" id="tags-body">
      <div class="tag-grid" id="tag-grid"></div>
    </div>
  </div>
  <div class="card">
    <div class="collapsible-header" onclick="toggleCollapsible('memo-body',this)">
      <div class="card-title" style="margin:0">メモ（任意）</div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="collapsible-body" id="memo-body">
      <textarea id="memo-input" placeholder="今日の出来事や気持ちを自由に…"></textarea>
    </div>
  </div>
  <button class="save-btn" onclick="saveEntry()">記録する</button>
  <!-- 広告スペース -->
  <div id="ad-space" style="width:100%;min-height:60px;margin-top:14px;background:var(--surface2);border-radius:var(--radius);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;">
    <span style="font-size:11px;color:var(--text-sub);">広告スペース</span>
  </div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div class="page-header"><div class="page-title">記録一覧</div></div>
  <div id="history-list"></div>
</div>

<!-- GRAPH PAGE -->
<div id="page-graph" class="page">
  <div class="page-header"><div class="page-title">振り返り</div></div>
  <div class="graph-controls">
    <button class="period-btn active" onclick="setPeriod('week',this)">今週</button>
    <button class="period-btn" onclick="setPeriod('month',this)">今月</button>
    <button class="period-btn" onclick="setPeriod('custom',this)">期間指定</button>
  </div>
  <div class="date-range-row" id="custom-range" style="display:none">
    <input type="date" id="range-start">
    <span>〜</span>
    <input type="date" id="range-end">
    <button class="period-btn active" onclick="renderGraph()" style="white-space:nowrap">表示</button>
  </div>
  <div class="card"><canvas id="score-chart" height="180"></canvas></div>
  <div class="stats-row" id="stats-row"></div>
  <div class="card" style="margin-top:14px">
    <div class="card-title">生活習慣の達成率</div>
    <div class="habit-stat-list" id="habit-stat-list"></div>
  </div>
  <button class="print-btn" onclick="printReport()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    印刷 / PDFで保存
  </button>
</div>

<!-- SETTINGS PAGE -->
<div id="page-settings" class="page">
  <div class="page-header"><div class="page-title">設定</div></div>
  <div class="card">
    <div class="setting-label">ホーム画面</div>
    <div class="setting-row" style="border:none;">
      <div>
        <div class="setting-row-label">アイコンをホーム画面に追加</div>
        <div class="setting-row-sub">ショートカットとして追加できます</div>
      </div>
      <button class="text-btn" onclick="showAddToHomeGuide()">追加する</button>
    </div>
  </div>
  <div class="card">
    <div class="setting-section">
      <div class="setting-label">テーマ</div>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
  </div>
  <div class="card">
    <div class="setting-label">通院日</div>
    <div class="setting-row">
      <div>
        <div class="setting-row-label">次の通院日</div>
        <div class="setting-row-sub" id="clinic-date-label">設定されていません</div>
      </div>

    </div>
    <div id="clinic-picker-row" style="padding:8px 0 4px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <input type="date" id="clinic-date-input" style="flex:1;min-width:0;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none;">
        <button onclick="confirmClinicDate()" style="padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;">決定</button>
      </div>
    </div>
    <div class="setting-row" id="clinic-remove-row" style="display:none">
      <div>
        <div class="setting-row-label">通院日を削除</div>
      </div>
      <button class="text-btn danger" onclick="removeClinicDate()">削除する</button>
    </div>

  </div>
  <div class="card">
    <div class="setting-label">セキュリティ</div>
    <div class="setting-row">
      <div>
        <div class="setting-row-label">PINロック</div>
        <div class="setting-row-sub" id="pin-status-label">設定されていません</div>
      </div>
      <button class="text-btn" id="pin-action-btn" onclick="openPinSetup()">設定する</button>
    </div>
    <div class="setting-row" id="pin-remove-row" style="display:none">
      <div>
        <div class="setting-row-label">PINを削除</div>
        <div class="setting-row-sub">ロックを解除します</div>
      </div>
      <button class="text-btn danger" onclick="removePin()">削除する</button>
    </div>
  </div>
</div>

<script>
var HABITS = [
  { key: 'sleep',    label: '睡眠（6時間以上）', type: 'simple' },
  { key: 'meal_m',   label: '食事・朝',           type: 'dual' },
  { key: 'meal_l',   label: '食事・昼',           type: 'dual' },
  { key: 'meal_d',   label: '食事・夕',           type: 'dual' },
  { key: 'bath',     label: '入浴',               type: 'dual' },
  { key: 'dental',   label: '歯磨き',             type: 'dual' },
  { key: 'walk',     label: '散歩',               type: 'dual' },
  { key: 'shopping', label: '買物',               type: 'dual' },
  { key: 'cooking',  label: '炊事',               type: 'dual' },
  { key: 'laundry',  label: '洗濯',               type: 'dual' },
  { key: 'cleaning', label: '掃除',               type: 'dual' },
  { key: 'bowel',    label: 'お通じ',             type: 'dual', btn1: 'ふつう', btn2: 'ゆるい' }
];

var TAGS = ['不安','憂うつ','疲れ','焦り','孤独','悲しみ','怒り','イライラ','混乱','恐怖','落ち着き','感謝','やる気','嬉しい','楽しい','安心','達成感'];

var THEMES = [
  { id: 'default', name: 'ナチュラル', color: '#7B9E87' },
  { id: 'sakura',  name: 'さくら',    color: '#D4789A' },
  { id: 'sky',     name: 'そら',      color: '#5B9BD5' },
  { id: 'forest',  name: 'もり',      color: '#4A8C5C' },
  { id: 'night',   name: 'よる',      color: '#8B9EC8' }
];

var state = { score: null, habits: {}, tags: [], memo: '' };
var currentPeriod = 'week';
var editingDate = '';

function getEntries() {
  try { return JSON.parse(localStorage.getItem('diary_entries') || '[]'); } catch(e) { return []; }
}
function saveEntries(arr) { localStorage.setItem('diary_entries', JSON.stringify(arr)); }
function getTheme() { return localStorage.getItem('diary_theme') || 'default'; }
function getPin() { return localStorage.getItem('diary_pin') || ''; }
function setStoredPin(p) { localStorage.setItem('diary_pin', p); }
function clearStoredPin() { localStorage.removeItem('diary_pin'); }

function setTheme(id) {
  localStorage.setItem('diary_theme', id);
  document.body.className = id === 'default' ? '' : 'theme-' + id;
  document.querySelectorAll('.theme-option').forEach(function(el) {
    el.classList.toggle('active', el.dataset.theme === id);
  });
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function fmtDate(str) {
  var p = str.split('-');
  var days = ['日','月','火','水','木','金','土'];
  var dow = days[new Date(str).getDay()];
  return p[0] + '年' + Number(p[1]) + '月' + Number(p[2]) + '日（' + dow + '）';
}

function fmtDateHTML(str) {
  var p = str.split('-');
  var days = ['日','月','火','水','木','金','土'];
  var dow = days[new Date(str).getDay()];
  var small = 'font-size:12px;font-weight:500;color:var(--text-sub);';
  var large = 'font-size:15px;font-weight:700;color:var(--text);';
  return '<div style="' + small + 'line-height:1.4;">' + p[0] + '年</div>' +
         '<div style="' + large + 'line-height:1.3;">' +
           Number(p[1]) + '月' + Number(p[2]) + '日' +
           '(' + dow + ')' +
         '</div>';
}

function init() {
  setTheme(getTheme());
  document.getElementById('today-label').innerHTML = fmtDateHTML(todayStr());
  document.getElementById('record-date').value = todayStr();
  editingDate = todayStr();
  buildHabitList();
  buildTagGrid();
  buildThemeGrid();
  loadEntryForDate(editingDate);
  renderHistory();
  renderGraph();
  initPremium();
  updatePinSettingsUI();
  updateClinicSettingsUI();
  if (getPin()) showLockScreen('unlock');
}

// ===== RECORD DATE =====
function onRecordDateChange() {
  var d = document.getElementById('record-date').value;
  if (!d) return;
  editingDate = d;
  resetRecordForm();
  loadEntryForDate(d);
  var isToday = (d === todayStr());
  document.getElementById('today-label').innerHTML = fmtDateHTML(d);
  updateClinicIconOnRecord();
}

function resetRecordForm() {
  state = { score: null, habits: {}, tags: [], memo: '' };
  document.querySelectorAll('.score-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.querySelectorAll('.habit-simple').forEach(function(el) { el.classList.remove('checked'); });
  document.querySelectorAll('.dual-btn').forEach(function(b) { b.classList.remove('sel-self','sel-assist'); });
  document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('selected'); });
  document.getElementById('memo-input').value = '';
  document.getElementById('already-saved-badge').style.display = 'none';
}

function loadEntryForDate(dateStr) {
  var entry = getEntries().find(function(e) { return e.date === dateStr; });
  if (!entry) return;
  document.getElementById('already-saved-badge').style.display = 'block';
  if (entry.score) selectScore(entry.score);
  if (entry.habits) {
    Object.keys(entry.habits).forEach(function(key) {
      var val = entry.habits[key];
      if (!val) return;
      state.habits[key] = val;
      var h = HABITS.find(function(x) { return x.key === key; });
      if (!h) return;
      if (h.type === 'simple') {
        var el = document.querySelector('.habit-simple[data-key="' + key + '"]');
        if (el) el.classList.add('checked');
      } else {
        var btn = document.querySelector('.dual-btn[data-key="' + key + '"][data-val="' + val + '"]');
        if (btn) btn.classList.add(val === 'self' ? 'sel-self' : 'sel-assist');
      }
    });
  }
  if (entry.tags) {
    entry.tags.forEach(function(t) {
      var btn = Array.from(document.querySelectorAll('.tag-btn')).find(function(b) { return b.textContent === t; });
      if (btn) { btn.classList.add('selected'); state.tags.push(t); }
    });
  }
  document.getElementById('memo-input').value = entry.memo || '';
}

// ===== HABIT LIST =====
function buildHabitList() {
  var list = document.getElementById('habit-list');
  list.innerHTML = '';
  HABITS.forEach(function(h) {
    if (h.type === 'simple') {
      var el = document.createElement('div');
      el.className = 'habit-simple';
      el.dataset.key = h.key;
      el.innerHTML = '<div class="habit-check"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="2 6 5 9 10 3"/></svg></div><span class="habit-name">' + h.label + '</span>';
      el.onclick = (function(key, elem){ return function(){ toggleSimple(key, elem); }; })(h.key, el);
      list.appendChild(el);
    } else {
      var b1 = h.btn1 || '自分で';
      var b2 = h.btn2 || '介助あり';
      var el2 = document.createElement('div');
      el2.className = 'habit-dual';
      var top = document.createElement('div'); top.className = 'habit-dual-top';
      var nameSpan = document.createElement('span'); nameSpan.className = 'habit-dual-name'; nameSpan.textContent = h.label;
      var btnsDiv = document.createElement('div'); btnsDiv.className = 'habit-dual-btns';
      var btn1El = document.createElement('button'); btn1El.className = 'dual-btn'; btn1El.dataset.key = h.key; btn1El.dataset.val = 'self'; btn1El.textContent = b1;
      var btn2El = document.createElement('button'); btn2El.className = 'dual-btn'; btn2El.dataset.key = h.key; btn2El.dataset.val = 'assist'; btn2El.textContent = b2;
      btn1El.onclick = (function(k, b){ return function(){ selectDual(k, 'self', b); }; })(h.key, btn1El);
      btn2El.onclick = (function(k, b){ return function(){ selectDual(k, 'assist', b); }; })(h.key, btn2El);
      btnsDiv.appendChild(btn1El); btnsDiv.appendChild(btn2El);
      top.appendChild(nameSpan); top.appendChild(btnsDiv);
      el2.appendChild(top);
      list.appendChild(el2);
    }
  });
}
function buildTagGrid() {
  var grid = document.getElementById('tag-grid');
  TAGS.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = t;
    btn.onclick = function() { toggleTag(t, btn); };
    grid.appendChild(btn);
  });
}

function buildThemeGrid() {
  var tg = document.getElementById('theme-grid');
  THEMES.forEach(function(th) {
    var el = document.createElement('div');
    el.className = 'theme-option' + (th.id === getTheme() ? ' active' : '');
    el.dataset.theme = th.id;
    el.innerHTML = '<div class="swatch" style="background:' + th.color + '"></div>' + th.name;
    el.onclick = function() { setTheme(th.id); };
    tg.appendChild(el);
  });
}

// ===== INTERACTIONS =====
function selectScore(n) {
  state.score = n;
  document.querySelectorAll('.score-btn').forEach(function(b) {
    b.classList.toggle('selected', Number(b.dataset.score) === n);
  });
}

function toggleSimple(key, el) {
  var checked = el.classList.toggle('checked');
  state.habits[key] = checked ? 'self' : null;
}

function selectDual(key, val, btn) {
  document.querySelectorAll('.dual-btn[data-key="' + key + '"]').forEach(function(b) {
    b.classList.remove('sel-self','sel-assist');
  });
  if (state.habits[key] === val) {
    state.habits[key] = null;
  } else {
    state.habits[key] = val;
    btn.classList.add(val === 'self' ? 'sel-self' : 'sel-assist');
  }
}

function toggleTag(t, btn) {
  btn.classList.toggle('selected');
  if (btn.classList.contains('selected')) {
    if (state.tags.indexOf(t) < 0) state.tags.push(t);
  } else {
    state.tags = state.tags.filter(function(x) { return x !== t; });
  }
}

function toggleCollapsible(bodyId, header) {
  document.getElementById(bodyId).classList.toggle('open');
  header.classList.toggle('open');
}

function saveEntry() {
  var entry = {
    date: editingDate,
    score: state.score,
    habits: Object.assign({}, state.habits),
    tags: state.tags.slice(),
    memo: document.getElementById('memo-input').value.trim()
  };
  var entries = getEntries().filter(function(e) { return e.date !== editingDate; });
  entries.unshift(entry);
  entries.sort(function(a,b){ return b.date.localeCompare(a.date); });
  saveEntries(entries);
  document.getElementById('already-saved-badge').style.display = 'block';
  showToast('記録しました ✓');
  renderHistory();
  renderGraph();
}

// ===== HISTORY =====
function renderHistory() {
  var list = document.getElementById('history-list');
  var entries = getEntries();
  if (!entries.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#x1F4D6;</div><p>まだ記録がありません</p></div>';
    return;
  }
  var scoreEmoji = ['','😞','😕','😐','🙂','😊'];
  list.innerHTML = '';
  entries.forEach(function(e) {
    var tagsHtml = (e.tags && e.tags.length) ? '<div class="history-tags">' + e.tags.map(function(t){ return '<span class="history-tag">' + t + '</span>'; }).join('') + '</div>' : '';
    var memoHtml = e.memo ? '<div class="history-note">' + e.memo + '</div>' : '';
    var scoreHtml = e.score ? scoreEmoji[e.score] : '―';
    var div = document.createElement('div');
    div.className = 'history-entry';
    div.innerHTML = '<div class="history-entry-header"><span class="history-date">' + fmtDate(e.date) + '</span><span class="history-score">' + scoreHtml + '</span></div>' + tagsHtml + memoHtml;
    div.onclick = (function(d){ return function(){ openEntryEdit(d); }; })(e.date);
    list.appendChild(div);
  });
}
function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('custom-range').style.display = p === 'custom' ? 'flex' : 'none';
  if (p !== 'custom') renderGraph();
}

function getDateRange() {
  var today = new Date();
  if (currentPeriod === 'week') {
    // 今週の月曜〜日曜
    var dow = today.getDay(); // 0=日, 1=月, ..., 6=土
    var diffToMon = (dow === 0) ? -6 : 1 - dow; // 月曜までの差分
    var mon = new Date(today); mon.setDate(today.getDate() + diffToMon);
    var sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return [mon, sun];
  } else if (currentPeriod === 'month') {
    // 今月1日〜末日
    var firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    var lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    return [firstDay, lastDay];
  } else {
    var s = document.getElementById('range-start').value;
    var e = document.getElementById('range-end').value;
    if (s && e) return [new Date(s), new Date(e)];
    return [new Date(today.getFullYear(), today.getMonth(), 1), today];
  }
}

function datesBetween(start, end) {
  var dates = []; var d = new Date(start);
  // toISOStringはUTC基準でずれるため、ローカル時間で文字列化
  function toLocalStr(dt) {
    return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
  }
  while (toLocalStr(d) <= toLocalStr(end)) {
    dates.push(toLocalStr(d));
    d.setDate(d.getDate()+1);
  }
  return dates;
}

function renderGraph() {
  var range = getDateRange();
  var dates = datesBetween(range[0], range[1]);
  var entries = getEntries();
  var entryMap = {};
  entries.forEach(function(e) { entryMap[e.date] = e; });

  var labels = dates.map(function(d) { var p = d.split('-'); return Number(p[1]) + '/' + Number(p[2]); });
  var scores = dates.map(function(d) { return entryMap[d] ? entryMap[d].score : null; });
  var scoreColors = ['','#E8A598','#E8C49A','#E8E0A0','#A8D4B0','#7BB8C0'];

  var canvas = document.getElementById('score-chart');
  var ctx = canvas.getContext('2d');
  var W = canvas.parentElement.offsetWidth - 36;
  canvas.width = W * devicePixelRatio;
  canvas.height = 180 * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = '180px';
  ctx.scale(devicePixelRatio, devicePixelRatio);

  var padL=28,padR=12,padT=16,padB=36;
  var cW=W-padL-padR, cH=180-padT-padB;
  var n=dates.length;
  var barW=Math.max(4,Math.min(28,(cW/n)-4));
  var isDark = document.body.classList.contains('theme-night');

  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  for (var i=1;i<=5;i++) {
    var y = padT + cH - (i/5)*cH;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(padL+cW,y); ctx.stroke();
    ctx.fillStyle = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(i, 4, y+4);
  }

  dates.forEach(function(d,i) {
    var x = padL + (i/n)*cW + (cW/n - barW)/2;
    var s = scores[i];
    if (s) {
      var barH = (s/5)*cH;
      ctx.fillStyle = scoreColors[s];
      ctx.beginPath();
      ctx.roundRect(x, padT+cH-barH, barW, barH, 4);
      ctx.fill();
    }
    // ラベル表示判定
    var showLabel = false;
    if (currentPeriod === 'month') {
      // 今月モード: 左端(1日)・右端(末日)・中間の日曜日のみ
      var dayNum = new Date(dates[i]).getDate();
      if (i === 0 || i === n-1 || dayNum === 5 || dayNum === 10 || dayNum === 15 || dayNum === 20 || dayNum === 25) showLabel = true;
    } else {
      // 今週・期間指定: 14日以下は全表示、それ以上は間引き
      if (n <= 14 || i % Math.ceil(n/10) === 0) showLabel = true;
    }
    if (showLabel) {
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(labels[i], x+barW/2, padT+cH+18);
    }
  });

  var recorded = scores.filter(Boolean);
  var avg = recorded.length ? (recorded.reduce(function(a,b){return a+b;},0)/recorded.length).toFixed(1) : '-';
  var rate = Math.round((recorded.length/dates.length)*100);
  var scoreEmoji = ['','😞','😕','😐','🙂','😊'];
  document.getElementById('stats-row').innerHTML =
    '<div class="stat-box"><div class="stat-val">' + (avg==='-' ? '-' : scoreEmoji[Math.round(avg)]) + '</div><div class="stat-lbl">平均気分</div></div>' +
    '<div class="stat-box"><div class="stat-val">' + avg + '</div><div class="stat-lbl">スコア平均</div></div>' +
    '<div class="stat-box"><div class="stat-val">' + rate + '%</div><div class="stat-lbl">記録率</div></div>';

  // Habit stats
  var recordedEntries = dates.map(function(d){ return entryMap[d] || null; }).filter(Boolean);
  var total = recordedEntries.length;
  var statList = document.getElementById('habit-stat-list');
  if (!total) {
    statList.innerHTML = '<div style="font-size:13px;color:var(--text-sub)">この期間の記録がありません</div>';
    return;
  }
  var html = '';
  HABITS.forEach(function(h) {
    var selfCount = 0, assistCount = 0;
    recordedEntries.forEach(function(e) {
      if (!e.habits) return;
      var v = e.habits[h.key];
      if (v === 'self') selfCount++;
      else if (v === 'assist') assistCount++;
    });
    var doneCount = selfCount + assistCount;
    var pct = Math.round((doneCount / total) * 100);
    var selfPct = Math.round((selfCount / total) * 100);
    var assistPct = Math.round((assistCount / total) * 100);

    var btn1 = h.btn1 || '自分で';
    var btn2 = h.btn2 || '介助あり';
    if (h.type === 'simple') {
      html += '<div class="habit-stat-row">' +

// ===== PIN LOCK =====
var pinBuffer = '';
var pinMode = 'unlock';
var pinTemp = '';

function updatePinDots() {
  for (var i=0;i<4;i++) {
    document.getElementById('dot'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function pinInput(n) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += String(n);
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(handlePinComplete, 120);
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('lock-error').textContent = '';
}

function handlePinComplete() {
  if (pinMode === 'unlock') {
    if (pinBuffer === getPin()) {
      document.getElementById('lock-screen').classList.add('hidden');
      checkClinicBanner();
      updateClinicIconOnRecord();
    } else {
      document.getElementById('lock-error').textContent = 'PINが違います';
      pinBuffer = '';
      updatePinDots();
    }
  } else if (pinMode === 'setup1') {
    pinTemp = pinBuffer;
    pinBuffer = '';
    updatePinDots();
    pinMode = 'setup2';
    document.getElementById('lock-title').textContent = 'もう一度入力';
    document.getElementById('lock-sub').textContent = '確認のためもう一度同じPINを入力してください';
    document.getElementById('lock-error').textContent = '';
  } else if (pinMode === 'setup2') {
    if (pinBuffer === pinTemp) {
      setStoredPin(pinBuffer);
      document.getElementById('lock-screen').classList.add('hidden');
      updatePinSettingsUI();
      showToast('PINを設定しました');
    } else {
      document.getElementById('lock-error').textContent = '入力が一致しません。最初からやり直してください';
      pinBuffer = ''; pinTemp = '';
      updatePinDots();
      pinMode = 'setup1';
      document.getElementById('lock-title').textContent = 'PIN設定';
      document.getElementById('lock-sub').textContent = '新しい4桁のPINを入力してください';
    }
  }
}

function showLockScreen(mode) {
  pinBuffer = ''; pinMode = mode;
  updatePinDots();
  document.getElementById('lock-error').textContent = '';
  if (mode === 'unlock') {
    document.getElementById('lock-title').textContent = 'ロック解除';
    document.getElementById('lock-sub').textContent = '4桁のPINを入力してください';
    document.getElementById('lock-note').textContent = '';
    document.getElementById('lock-cancel-btn').style.display = 'none';
  } else {
    document.getElementById('lock-title').textContent = 'PIN設定';
    document.getElementById('lock-sub').textContent = '新しい4桁のPINを入力してください';
    document.getElementById('lock-note').innerHTML = 'PINを忘れると記録を参照できなくなります。<br>ご注意ください。';
    document.getElementById('lock-cancel-btn').style.display = 'block';
  }
  document.getElementById('lock-screen').classList.remove('hidden');
}

function openPinSetup() { pinTemp = ''; showLockScreen('setup1'); }

function cancelPinSetup() {
  document.getElementById('lock-screen').classList.add('hidden');
  pinBuffer = ''; pinTemp = '';
}

function removePin() {
  showConfirm('PINを削除してロックを解除しますか？', function() {
    clearStoredPin();
    updatePinSettingsUI();
    showToast('PINを削除しました');
  });
}

function updatePinSettingsUI() {
  var hasPin = !!getPin();
  document.getElementById('pin-status-label').textContent = hasPin ? '設定済み' : '設定されていません';
  document.getElementById('pin-action-btn').textContent = hasPin ? '変更する' : '設定する';
  document.getElementById('pin-remove-row').style.display = hasPin ? '' : 'none';
}

// ===== 通院日 =====
function getClinicDate() { return localStorage.getItem('ashiato_clinic_date') || ''; }

function confirmClinicDate() {
  var d = document.getElementById('clinic-date-input').value;
  if (!d) { showToast('日付を選択してください'); return; }
  localStorage.setItem('ashiato_clinic_date', d);
  document.getElementById('clinic-picker-row').style.display = 'none';
  updateClinicSettingsUI();
  showToast('通院日を設定しました');
}
function saveClinicDate() {
  // 後方互換のため残す（呼ばれない）
}
function removeClinicDate() {
  localStorage.removeItem('ashiato_clinic_date');
  updateClinicSettingsUI();
  showToast('通院日を削除しました');
}
function updateClinicSettingsUI() {
  var d = getClinicDate();
  var label = document.getElementById('clinic-date-label');
  var removeRow = document.getElementById('clinic-remove-row');
  var actionBtn = document.querySelector('#clinic-remove-row ~ * .text-btn, .setting-row .text-btn');
  var input = document.getElementById('clinic-date-input');
  if (d) {
    label.textContent = fmtDate(d);
    removeRow.style.display = '';
    if (input) input.value = d;
  } else {
    label.textContent = '設定されていません';
    removeRow.style.display = 'none';
  }
}
function checkClinicBanner() {
  var d = getClinicDate();
  if (!d) return;
  var now = new Date();
  var todayStr2 = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var today = new Date(todayStr2 + 'T00:00:00');
  var clinic = new Date(d + 'T00:00:00');
  var diff = Math.round((clinic - today) / (1000 * 60 * 60 * 24));
  var banner = document.getElementById('clinic-banner');
  var bannerText = document.getElementById('clinic-banner-text');
  var dismissed = sessionStorage.getItem('clinic_banner_dismissed');
  if (dismissed === d) return;
  if (diff === 0) {
    bannerText.textContent = '本日は通院日です 🏥';
    banner.style.display = 'block';
    banner.style.background = '#8B2035';
  } else if (diff === 1) {
    bannerText.textContent = '明日（' + fmtDate(d) + '）は通院日です 🏥';
    banner.style.display = 'block';
    banner.style.background = 'var(--accent-dark)';
  } else if (diff === 3) {
    bannerText.textContent = '3日後（' + fmtDate(d) + '）に通院予定です';
    banner.style.display = 'block';
    banner.style.background = 'var(--accent)';
  } else if (diff === 7) {
    bannerText.textContent = '1週間後（' + fmtDate(d) + '）に通院予定です';
    banner.style.display = 'block';
    banner.style.background = 'var(--accent)';
  }
  // バナー表示時はページ上部にpaddingを追加
  if (banner.style.display === 'block') {
    document.querySelectorAll('.page').forEach(function(p) {
      p.style.paddingTop = '60px';
    });
  }
}
function dismissClinicBanner() {
  var d = getClinicDate();
  sessionStorage.setItem('clinic_banner_dismissed', d);
  document.getElementById('clinic-banner').style.display = 'none';
  document.querySelectorAll('.page').forEach(function(p) {
    p.style.paddingTop = '';
  });
}

function updateClinicIconOnRecord() {
  // 通院日バッジは非表示
  var existing = document.getElementById('clinic-icon');
  if (existing) existing.parentNode.removeChild(existing);
}

init();
// PINなし起動時に通院バナー・アイコンを表示
if (!getPin()) {
  checkClinicBanner();
  updateClinicIconOnRecord();
}
</script>
